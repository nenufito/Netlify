<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin</title>
    <link rel="icon" type="image/png" href="/img/seguridad.png">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #ffffff;
            --text: #111111;
            --muted: #666666;
            --line: #e9e9e9;
            --gold: #a8891a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 10% 10%, #1a1a1a 0%, var(--bg) 55%);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--line);
            padding: 24px;
        }

        .kicker {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .2em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 8px;
            color: var(--text);
        }

        p {
            color: var(--muted);
            margin-bottom: 20px;
            font-size: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            letter-spacing: .1em;
            font-weight: 700;
            text-transform: uppercase;
            color: #222;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            margin-bottom: 14px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: var(--gold);
        }

        button {
            width: 100%;
            border: 1px solid var(--gold);
            background: var(--gold);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: .1em;
            font-weight: 800;
            padding: 12px;
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.05);
        }

        #loginFeedback {
            margin-top: 14px;
            min-height: 18px;
            color: #8a2c2c;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="kicker">Panel Privado</div>
        <h1>Admin Login</h1>
        <p>Introduce tus credenciales para acceder al dashboard.</p>
        <form id="adminLoginForm">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>

            <button type="submit">Entrar</button>
            <div id="loginFeedback"></div>
        </form>
    </main>
    <script src="/js/admin-login.js"></script>
</body>
</html>
